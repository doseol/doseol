<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>성리학 도설 아카이브</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;500;700&family=Noto+Sans+KR:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#FAFAF7;--bg2:#F2F0EB;--bg3:#E8E5DD;
  --text:#1A1916;--text2:#5A5751;--text3:#9A9590;
  --border:#D8D4CC;--border2:#C4BFB5;
  --accent:#3B3460;--accent-light:#EEEDFE;
  --serif:'Noto Serif KR',serif;--sans:'Noto Sans KR',sans-serif;
  --radius:10px;--radius-lg:16px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--sans);background:var(--bg);color:var(--text);min-height:100vh;line-height:1.6}
.container{max-width:1100px;margin:0 auto;padding:0 2rem}

/* Header */
.site-header{border-bottom:1px solid var(--border);padding:1.5rem 0;background:var(--bg);position:sticky;top:0;z-index:100}
.site-header .container{display:flex;align-items:center;justify-content:space-between;gap:1.5rem}
.logo{display:flex;align-items:baseline;gap:10px;text-decoration:none;flex-shrink:0}
.logo-kr{font-family:var(--serif);font-size:17px;font-weight:700;color:var(--text)}
.logo-en{font-size:11px;color:var(--text3);letter-spacing:0.08em;text-transform:uppercase;font-weight:300}
.search-wrap{flex:1;max-width:420px;position:relative}
.search-wrap svg{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--text3);pointer-events:none}
#search{width:100%;padding:9px 12px 9px 38px;font-family:var(--sans);font-size:14px;border:1px solid var(--border);border-radius:8px;background:white;color:var(--text);outline:none;transition:border-color .2s}
#search:focus{border-color:var(--accent)}
#search::placeholder{color:var(--text3)}
.header-count{font-size:12px;color:var(--text3);white-space:nowrap}

/* Layout */
.main{padding:2rem 0 4rem}
.layout{display:grid;grid-template-columns:220px 1fr;gap:2rem;align-items:start}

/* Sidebar */
.sidebar{position:sticky;top:80px}
.sidebar-section{margin-bottom:1.5rem}
.sidebar-label{font-size:10px;letter-spacing:0.12em;text-transform:uppercase;color:var(--text3);font-weight:500;margin-bottom:8px}
.filter-list{display:flex;flex-direction:column;gap:2px}
.filter-btn{display:flex;align-items:center;justify-content:space-between;padding:6px 10px;border-radius:7px;font-size:13px;color:var(--text2);cursor:pointer;border:none;background:none;font-family:var(--sans);width:100%;text-align:left;transition:background .15s,color .15s}
.filter-btn:hover{background:var(--bg2);color:var(--text)}
.filter-btn.active{background:var(--accent-light);color:var(--accent);font-weight:500}
.filter-count{font-size:11px;color:var(--text3);background:var(--bg2);padding:1px 6px;border-radius:10px}
.filter-btn.active .filter-count{background:white;color:var(--accent)}
.divider{height:1px;background:var(--border);margin:1rem 0}

/* Cards */
.cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:12px;margin-bottom:1.5rem}
.card{background:white;border:1px solid var(--border);border-radius:var(--radius-lg);padding:1.1rem 1.2rem;cursor:pointer;transition:border-color .2s,box-shadow .2s;display:flex;flex-direction:column;gap:6px}
.card:hover{border-color:var(--border2);box-shadow:0 2px 8px rgba(0,0,0,.06)}
.card.active{border-color:var(--accent);border-width:1.5px}
.card-top{display:flex;justify-content:space-between;align-items:flex-start;gap:6px}
.card-titles{flex:1}
.card-name{font-family:var(--serif);font-size:15px;font-weight:700;color:var(--text);line-height:1.3}
.card-hanja{font-size:11px;color:var(--text3);margin-top:1px}
.era-badge{font-size:10px;padding:2px 8px;border-radius:20px;font-weight:500;white-space:nowrap;flex-shrink:0}
.card-author{font-size:12px;color:var(--text3)}
.card-desc{font-size:12px;color:var(--text2);line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.card-tags{display:flex;gap:4px;flex-wrap:wrap;margin-top:2px}
.tag{font-size:10px;padding:2px 7px;border-radius:8px;background:var(--bg2);color:var(--text3)}
.soon-badge{font-size:10px;padding:2px 7px;border-radius:8px;background:#FEF3C7;color:#92400E}

/* Detail panel */
.detail-panel{background:white;border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;margin-bottom:1.5rem}
.detail-header{padding:1.4rem 1.5rem 1.2rem;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;gap:1rem;justify-content:space-between}
.detail-titles{flex:1}
.detail-name{font-family:var(--serif);font-size:22px;font-weight:700;color:var(--text);margin-bottom:2px}
.detail-hanja{font-size:13px;color:var(--text3);margin-bottom:10px}
.detail-desc{font-size:13px;color:var(--text2);line-height:1.7;margin-bottom:10px}
.detail-meta{display:flex;gap:16px;flex-wrap:wrap}
.detail-meta span{font-size:12px;color:var(--text3)}
.detail-meta strong{color:var(--text2);font-weight:500}
.detail-actions{display:flex;flex-direction:column;gap:6px;align-items:flex-end;flex-shrink:0}
.btn{display:inline-flex;align-items:center;gap:5px;padding:7px 14px;border-radius:8px;font-size:13px;font-family:var(--sans);cursor:pointer;border:1px solid var(--border);background:white;color:var(--text2);text-decoration:none;transition:all .15s;white-space:nowrap}
.btn:hover{background:var(--bg2);border-color:var(--border2);color:var(--text)}
.btn-primary{background:var(--accent);border-color:var(--accent);color:white}
.btn-primary:hover{opacity:.88;background:var(--accent);color:white}

/* Concepts bar */
.concepts-bar{padding:.9rem 1.5rem;background:var(--bg);border-bottom:1px solid var(--border);display:flex;gap:6px;flex-wrap:wrap;align-items:center}
.concept-chip{font-size:11px;padding:3px 10px;border-radius:12px;background:white;border:1px solid var(--border);color:var(--text2);cursor:pointer;transition:all .15s}
.concept-chip:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-light)}
.concept-label{font-size:11px;color:var(--text3);margin-right:2px}

/* View controls */
.view-controls{padding:.85rem 1.5rem;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;background:var(--bg)}
.view-label{font-size:12px;color:var(--text3);margin-right:2px}
.view-btn{display:inline-flex;align-items:center;gap:5px;padding:5px 12px;border-radius:7px;font-size:12px;font-family:var(--sans);cursor:pointer;border:1px solid var(--border);background:white;color:var(--text2);transition:all .15s}
.view-btn:hover{background:var(--bg2)}
.view-btn.active{background:var(--accent-light);border-color:var(--accent);color:var(--accent);font-weight:500}

/* Tabs */
.tab-bar{display:flex;border-bottom:1px solid var(--border);padding:0 1.5rem;background:white}
.tab-btn{padding:10px 18px;font-size:13px;font-family:var(--sans);cursor:pointer;border:none;background:none;color:var(--text3);border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .15s}
.tab-btn:hover{color:var(--text2)}
.tab-btn.active{color:var(--accent);border-bottom-color:var(--accent);font-weight:500}

/* Panels */
.tab-panel{display:none;padding:1.5rem}
.tab-panel.visible{display:block}
.tab-panel svg{width:100%;height:auto;display:block}

/* Side-by-side */
.side-wrap{display:none;grid-template-columns:1fr 1fr}
.side-wrap.visible{display:grid}
.side-pane{padding:1.5rem}
.side-pane+.side-pane{border-left:1px solid var(--border)}
.side-pane-label{font-size:11px;letter-spacing:0.1em;text-transform:uppercase;color:var(--text3);font-weight:500;margin-bottom:1rem;display:flex;align-items:center;gap:6px}
.dot{width:6px;height:6px;border-radius:50%;background:var(--border2);display:inline-block}
.dot-accent{background:var(--accent)}
.side-pane svg{width:100%;height:auto;display:block}

/* Original image placeholder */
.orig-placeholder{aspect-ratio:3/5;background:var(--bg2);border-radius:var(--radius);border:1.5px dashed var(--border2);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;color:var(--text3);cursor:pointer;transition:all .2s}
.orig-placeholder:hover{border-color:var(--accent);background:var(--accent-light);color:var(--accent)}
.orig-placeholder .ph-title{font-size:13px;font-weight:500}
.orig-placeholder .ph-sub{font-size:12px;text-align:center;line-height:1.6;max-width:160px;opacity:.8}
.orig-img{width:100%;border-radius:var(--radius);display:block}

/* Soon */
.soon-area{padding:2.5rem 1.5rem;text-align:center;display:flex;flex-direction:column;align-items:center;gap:.75rem}
.soon-title{font-family:var(--serif);font-size:16px;font-weight:700;color:var(--text)}
.soon-sub{font-size:13px;color:var(--text2);line-height:1.6;max-width:340px}

.upload-input{display:none}

/* SVG interactivity */
.ds-node{cursor:pointer}
.ds-node rect{transition:opacity .15s}
.ds-node:hover rect{opacity:.85}

@media(max-width:720px){
  .layout{grid-template-columns:1fr}
  .sidebar{position:static}
  .container{padding:0 1rem}
  .site-header .container{flex-wrap:wrap}
  .header-count{display:none}
  .side-wrap.visible{grid-template-columns:1fr}
  .side-pane+.side-pane{border-left:none;border-top:1px solid var(--border)}
}
</style>
</head>
<body>

<header class="site-header">
  <div class="container">
    <a class="logo" href="#">
      <span class="logo-kr">성리학 도설 아카이브</span>
      <span class="logo-en">Neo-Confucian Diagrams</span>
    </a>
    <div class="search-wrap">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input type="text" id="search" placeholder="도설명, 저자, 개념어 검색…" oninput="render()">
    </div>
    <span class="header-count" id="hcount"></span>
  </div>
</header>

<main class="main">
  <div class="container">
    <div class="layout">
      <aside class="sidebar">
        <div class="sidebar-section">
          <div class="sidebar-label">국가</div>
          <div class="filter-list" id="filter-country"></div>
        </div>
        <div class="divider"></div>
        <div class="sidebar-section">
          <div class="sidebar-label">시대</div>
          <div class="filter-list" id="filter-era"></div>
        </div>
        <div class="divider"></div>
        <div class="sidebar-section">
          <div class="sidebar-label">주제</div>
          <div class="filter-list" id="filter-topic"></div>
        </div>
      </aside>
      <div class="cards-area">
        <div class="cards-grid" id="grid"></div>
        <div id="detail"></div>
      </div>
    </div>
  </div>
</main>

<input type="file" class="upload-input" id="img-upload" accept="image/*" onchange="handleUpload(event)">

<script>
const DOSEOL=[
  {id:'taeguk',title:'태극도설',hanja:'太極圖說',author:'주돈이 (周敦頤)',era:'북송',country:'중국',year:'1017–1073',
   desc:'무극에서 태극, 음양, 오행을 거쳐 만물이 생성되고 인간의 도덕 원리(인극)로 완성되는 우주 생성론. 성리학 우주론의 출발점.',
   tags:['태극','음양','오행','인극','무극'],
   concepts:['무극이태극','음양','오행','건도성남','곤도성녀','만물화생','인극','성인','주정(主靜)'],
   topics:['우주론','존재론'],era_color:'#534AB7',era_bg:'#EEEDFE',status:'done'},
  {id:'seonghak',title:'성학십도',hanja:'聖學十圖',author:'이황 (李滉)',era:'조선 중기',country:'한국',year:'1568',
   desc:'선조에게 올린 10개의 도설. 경(敬)을 중심으로 성학의 전 과정을 체계화한 퇴계학의 결정.',
   tags:['경(敬)','성학','심학','인(仁)','태극'],
   concepts:['태극도','서명도','소학도','대학도','심통성정도','인설도','심학도','경재잠도'],
   topics:['수양론','심성론'],era_color:'#0F6E56',era_bg:'#E1F5EE',status:'soon'},
  {id:'simdo',title:'심통성정도',hanja:'心統性情圖',author:'이황 (李滉)',era:'조선 중기',country:'한국',year:'1568',
   desc:'마음(心)이 성(性)과 정(情)을 통괄하는 구조를 도식화. 사단칠정 논쟁의 핵심 도해.',
   tags:['심(心)','성(性)','정(情)','사단','칠정'],
   concepts:['심','성','정','사단','칠정','이발','기발'],
   topics:['심성론','윤리학'],era_color:'#993C1D',era_bg:'#FAECE7',status:'soon'},
  {id:'gewu',title:'격물치지도',hanja:'格物致知圖',author:'주희 (朱熹)',era:'남송',country:'중국',year:'1130–1200',
   desc:'사물의 이치를 탐구하여(格物) 앎을 완성하는(致知) 과정을 도식으로 표현. 주자학 인식론의 핵심.',
   tags:['격물','치지','이(理)','궁리','대학'],
   concepts:['격물','치지','성의','정심','수신','이(理)','기(氣)'],
   topics:['인식론','수양론'],era_color:'#185FA5',era_bg:'#E6F1FB',status:'soon'},
  {id:'igido',title:'이기론 구조도',hanja:'理氣論 構造圖',author:'이이 (李珥)',era:'조선 중기',country:'한국',year:'1536–1584',
   desc:'이(理)와 기(氣)의 관계를 기발이승일도설로 정리한 율곡의 이기론 도해.',
   tags:['이(理)','기(氣)','이기론','기발이승','사단칠정'],
   concepts:['이(理)','기(氣)','이통기국','기발이승','사단','칠정'],
   topics:['존재론','심성론'],era_color:'#854F0B',era_bg:'#FAEEDA',status:'soon'},
  {id:'ximing',title:'서명도',hanja:'西銘圖',author:'장재 (張載)',era:'북송',country:'중국',year:'1020–1077',
   desc:'천지를 부모로, 만물을 동포로 여기는 민포물여 사상을 도식화. 성리학 윤리론의 초석.',
   tags:['천지','민포물여','인(仁)','기(氣)','태화'],
   concepts:['건(乾)','곤(坤)','민포물여','태화','기(氣)'],
   topics:['윤리학','우주론'],era_color:'#3B6D11',era_bg:'#EAF3DE',status:'soon'},
];

const S={country:'전체',era:'전체',topic:'전체',selected:'taeguk',view:'tab',tab:'modern',imgs:{}};

function filtered(){
  const q=document.getElementById('search').value.trim().toLowerCase();
  return DOSEOL.filter(d=>{
    if(S.country!=='전체'&&d.country!==S.country)return false;
    if(S.era!=='전체'&&d.era!==S.era)return false;
    if(S.topic!=='전체'&&!d.topics.includes(S.topic))return false;
    if(!q)return true;
    return d.title.includes(q)||d.hanja.includes(q)||d.author.includes(q)||
      d.tags.some(t=>t.includes(q))||d.concepts.some(c=>c.includes(q))||d.desc.includes(q);
  });
}

function countFor(key,val){
  return val==='전체'?DOSEOL.length:DOSEOL.filter(d=>Array.isArray(d[key])?d[key].includes(val):d[key]===val).length;
}

function renderSidebar(){
  [['country',['전체','중국','한국'],'country'],
   ['era',['전체','북송','남송','조선 중기'],'era'],
   ['topic',['전체','우주론','존재론','심성론','수양론','인식론','윤리학'],'topics']
  ].forEach(([type,vals,key])=>{
    document.getElementById('filter-'+type).innerHTML=vals.map(v=>
      `<button class="filter-btn${S[type]===v?' active':''}" onclick="sf('${type}','${v}')">
        ${v}<span class="filter-count">${countFor(key,v)}</span>
      </button>`).join('');
  });
}

function sf(type,val){S[type]=val;render();}

function render(){
  renderSidebar();
  const list=filtered();
  document.getElementById('hcount').textContent=`도설 ${list.length}개`;
  const grid=document.getElementById('grid');
  if(!list.length){
    grid.innerHTML=`<div style="grid-column:1/-1;text-align:center;padding:3rem;color:var(--text3);font-size:14px">검색 결과가 없습니다</div>`;
    document.getElementById('detail').innerHTML='';
    return;
  }
  grid.innerHTML=list.map(d=>`
    <div class="card${S.selected===d.id?' active':''}" onclick="sel('${d.id}')">
      <div class="card-top">
        <div class="card-titles">
          <div class="card-name">${d.title}</div>
          <div class="card-hanja">${d.hanja}</div>
        </div>
        <span class="era-badge" style="background:${d.era_bg};color:${d.era_color}">${d.era}</span>
      </div>
      <div class="card-author">${d.author}</div>
      <div class="card-desc">${d.desc}</div>
      <div class="card-tags">
        ${d.tags.slice(0,3).map(t=>`<span class="tag">${t}</span>`).join('')}
        ${d.status==='soon'?'<span class="soon-badge">준비중</span>':''}
      </div>
    </div>`).join('');
  renderDetail();
}

function sel(id){S.selected=id;S.tab='modern';render();setTimeout(()=>document.getElementById('detail').scrollIntoView({behavior:'smooth',block:'nearest'}),60);}

function renderDetail(){
  const d=DOSEOL.find(x=>x.id===S.selected);
  if(!d)return;
  const el=document.getElementById('detail');
  const hasImg=!!S.imgs[d.id];

  const header=`
    <div class="detail-header">
      <div class="detail-titles">
        <div class="detail-name">${d.title}</div>
        <div class="detail-hanja">${d.hanja} · ${d.author} · ${d.country} ${d.era}</div>
        <div class="detail-desc">${d.desc}</div>
        <div class="detail-meta">
          <span><strong>주제</strong> ${d.topics.join(', ')}</span>
          <span><strong>연도</strong> ${d.year}</span>
        </div>
      </div>
      <div class="detail-actions">
        <button class="btn btn-primary" onclick="tip('${d.title}')">개념 질문 ↗</button>
      </div>
    </div>
    <div class="concepts-bar">
      <span class="concept-label">핵심 개념</span>
      ${d.concepts.map(c=>`<span class="concept-chip" onclick="tip('${c}')">${c}</span>`).join('')}
    </div>`;

  if(d.status==='soon'){
    el.innerHTML=`<div class="detail-panel">${header}
      <div class="soon-area">
        <div class="soon-title">도설 시각화 준비중</div>
        <div class="soon-sub">개념 칩을 클릭하거나 개념 질문 버튼으로 내용을 먼저 확인하세요.</div>
      </div>
    </div>`;
    return;
  }

  const origPane=hasImg
    ?`<img class="orig-img" src="${S.imgs[d.id]}" alt="원본 도설">`
    :`<div class="orig-placeholder" onclick="openUpload('${d.id}')">
        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="opacity:.4"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="m21 15-5-5L5 21"/></svg>
        <div class="ph-title">원본 이미지 없음</div>
        <div class="ph-sub">클릭하여 원본 도설 이미지 업로드</div>
      </div>`;

  const modernPane=`<div id="svg-area"></div>`;

  const viewCtrl=`
    <div class="view-controls">
      <span class="view-label">보기 방식</span>
      <button class="view-btn${S.view==='tab'?' active':''}" onclick="setView('tab')">
        <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="1" y="5" width="14" height="9" rx="1.5"/><path d="M1 8h14"/><path d="M5 5V3"/><path d="M11 5V3"/></svg>
        탭 전환
      </button>
      <button class="view-btn${S.view==='side'?' active':''}" onclick="setView('side')">
        <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="1" y="2" width="6" height="12" rx="1"/><rect x="9" y="2" width="6" height="12" rx="1"/></svg>
        나란히 보기
      </button>
      ${hasImg?`<button class="view-btn" style="margin-left:auto;font-size:11px" onclick="openUpload('${d.id}')">이미지 교체</button>`:`<button class="view-btn" style="margin-left:auto;font-size:11px" onclick="openUpload('${d.id}')">원본 이미지 업로드</button>`}
    </div>`;

  let body='';
  if(S.view==='tab'){
    body=`
      <div class="tab-bar">
        <button class="tab-btn${S.tab==='modern'?' active':''}" onclick="setTab('modern')">현대적 재구성</button>
        <button class="tab-btn${S.tab==='original'?' active':''}" onclick="setTab('original')">원본 도설</button>
      </div>
      <div class="tab-panel${S.tab==='modern'?' visible':''}" id="panel-modern">${modernPane}</div>
      <div class="tab-panel${S.tab==='original'?' visible':''}" id="panel-original">${origPane}</div>`;
  } else {
    body=`
      <div class="side-wrap visible">
        <div class="side-pane">
          <div class="side-pane-label"><span class="dot dot-accent"></span>현대적 재구성</div>
          ${modernPane}
        </div>
        <div class="side-pane">
          <div class="side-pane-label"><span class="dot"></span>원본 도설</div>
          ${origPane}
        </div>
      </div>`;
  }

  el.innerHTML=`<div class="detail-panel">${header}${viewCtrl}${body}</div>`;
  buildSvg();
}

function setView(v){S.view=v;renderDetail();}
function setTab(t){S.tab=t;renderDetail();}

function openUpload(id){
  document.getElementById('img-upload').setAttribute('data-id',id);
  document.getElementById('img-upload').click();
}

function handleUpload(e){
  const file=e.target.files[0];
  const id=e.target.getAttribute('data-id')||S.selected;
  if(!file)return;
  const r=new FileReader();
  r.onload=ev=>{S.imgs[id]=ev.target.result;renderDetail();};
  r.readAsDataURL(file);
  e.target.value='';
}

function tip(concept){
  const el=document.createElement('div');
  el.style.cssText=`position:fixed;bottom:24px;left:50%;transform:translateX(-50%);
    background:#1A1916;color:white;padding:10px 18px;border-radius:10px;font-size:13px;
    font-family:'Noto Sans KR',sans-serif;z-index:9999;max-width:90%;text-align:center`;
  el.textContent=`💬 Claude에게 "${concept}"에 대해 질문해보세요`;
  document.body.appendChild(el);
  el.animate([{opacity:0,transform:'translateX(-50%) translateY(8px)'},{opacity:1,transform:'translateX(-50%) translateY(0)'}],{duration:300,fill:'forwards'});
  setTimeout(()=>el.remove(),3000);
}

function tgSpin(){
  const g=document.getElementById('tg');
  if(!g)return;
  g.style.transformOrigin='340px 148px';
  g.style.animation='none';
  void g.offsetWidth;
  g.style.animation='tgspin 2s ease-in-out forwards';
}

const st=document.createElement('style');

document.head.appendChild(st);
