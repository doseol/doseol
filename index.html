<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>성리학 도설 아카이브</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;500;700&family=Noto+Sans+KR:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #FAFAF7;
  --bg2: #F2F0EB;
  --bg3: #E8E5DD;
  --text: #1A1916;
  --text2: #5A5751;
  --text3: #9A9590;
  --border: #D8D4CC;
  --border2: #C4BFB5;
  --accent: #3B3460;
  --accent-light: #EEEDFE;
  --serif: 'Noto Serif KR', serif;
  --sans: 'Noto Sans KR', sans-serif;
  --radius: 10px;
  --radius-lg: 16px;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: var(--sans);
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  line-height: 1.6;
}

/* Layout */
.container { max-width: 1100px; margin: 0 auto; padding: 0 2rem; }

/* Header */
.site-header {
  border-bottom: 1px solid var(--border);
  padding: 1.5rem 0;
  background: var(--bg);
  position: sticky;
  top: 0;
  z-index: 100;
}
.site-header .container {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 1.5rem;
}
.logo {
  display: flex;
  align-items: baseline;
  gap: 10px;
  text-decoration: none;
  flex-shrink: 0;
}
.logo-kr { font-family: var(--serif); font-size: 17px; font-weight: 700; color: var(--text); }
.logo-en { font-size: 11px; color: var(--text3); letter-spacing: 0.08em; text-transform: uppercase; font-weight: 300; }
.search-wrap { flex: 1; max-width: 420px; position: relative; }
.search-wrap svg { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--text3); pointer-events: none; }
#search {
  width: 100%;
  padding: 9px 12px 9px 38px;
  font-family: var(--sans);
  font-size: 14px;
  border: 1px solid var(--border);
  border-radius: 8px;
  background: white;
  color: var(--text);
  outline: none;
  transition: border-color .2s;
}
#search:focus { border-color: var(--accent); }
#search::placeholder { color: var(--text3); }
.header-count { font-size: 12px; color: var(--text3); white-space: nowrap; }

/* Main */
.main { padding: 2rem 0 4rem; }
.layout { display: grid; grid-template-columns: 220px 1fr; gap: 2rem; align-items: start; }

/* Sidebar */
.sidebar { position: sticky; top: 80px; }
.sidebar-section { margin-bottom: 1.5rem; }
.sidebar-label { font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text3); font-weight: 500; margin-bottom: 8px; }
.filter-list { display: flex; flex-direction: column; gap: 2px; }
.filter-btn {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 6px 10px;
  border-radius: 7px;
  font-size: 13px;
  color: var(--text2);
  cursor: pointer;
  border: none;
  background: none;
  font-family: var(--sans);
  width: 100%;
  text-align: left;
  transition: background .15s, color .15s;
}
.filter-btn:hover { background: var(--bg2); color: var(--text); }
.filter-btn.active { background: var(--accent-light); color: var(--accent); font-weight: 500; }
.filter-count { font-size: 11px; color: var(--text3); background: var(--bg2); padding: 1px 6px; border-radius: 10px; }
.filter-btn.active .filter-count { background: white; color: var(--accent); }
.divider { height: 1px; background: var(--border); margin: 1rem 0; }

/* Grid */
.cards-area {}
.cards-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
  gap: 12px;
  margin-bottom: 1.5rem;
}
.card {
  background: white;
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 1.1rem 1.2rem;
  cursor: pointer;
  transition: border-color .2s, box-shadow .2s;
  display: flex;
  flex-direction: column;
  gap: 6px;
}
.card:hover { border-color: var(--border2); box-shadow: 0 2px 8px rgba(0,0,0,.06); }
.card.active { border-color: var(--accent); border-width: 1.5px; }
.card-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 6px; }
.card-titles { flex: 1; }
.card-name { font-family: var(--serif); font-size: 15px; font-weight: 700; color: var(--text); line-height: 1.3; }
.card-hanja { font-size: 11px; color: var(--text3); margin-top: 1px; }
.era-badge {
  font-size: 10px;
  padding: 2px 8px;
  border-radius: 20px;
  font-weight: 500;
  white-space: nowrap;
  flex-shrink: 0;
}
.card-author { font-size: 12px; color: var(--text3); }
.card-desc { font-size: 12px; color: var(--text2); line-height: 1.5; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
.card-tags { display: flex; gap: 4px; flex-wrap: wrap; margin-top: 2px; }
.tag { font-size: 10px; padding: 2px 7px; border-radius: 8px; background: var(--bg2); color: var(--text3); }
.soon-badge { font-size: 10px; padding: 2px 7px; border-radius: 8px; background: #FEF3C7; color: #92400E; }

/* Detail panel */
.detail-panel {
  background: white;
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  overflow: hidden;
  margin-bottom: 1.5rem;
}
.detail-header {
  padding: 1.4rem 1.5rem 1.2rem;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: flex-start;
  gap: 1rem;
  justify-content: space-between;
}
.detail-titles { flex: 1; }
.detail-name { font-family: var(--serif); font-size: 22px; font-weight: 700; color: var(--text); margin-bottom: 2px; }
.detail-hanja { font-size: 13px; color: var(--text3); margin-bottom: 10px; }
.detail-desc { font-size: 13px; color: var(--text2); line-height: 1.7; margin-bottom: 10px; }
.detail-meta { display: flex; gap: 16px; flex-wrap: wrap; }
.detail-meta span { font-size: 12px; color: var(--text3); }
.detail-meta strong { color: var(--text2); font-weight: 500; }
.detail-actions { display: flex; flex-direction: column; gap: 6px; align-items: flex-end; flex-shrink: 0; }
.btn {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  padding: 7px 14px;
  border-radius: 8px;
  font-size: 13px;
  font-family: var(--sans);
  cursor: pointer;
  border: 1px solid var(--border);
  background: white;
  color: var(--text2);
  text-decoration: none;
  transition: all .15s;
  white-space: nowrap;
}
.btn:hover { background: var(--bg2); border-color: var(--border2); color: var(--text); }
.btn-primary { background: var(--accent); border-color: var(--accent); color: white; }
.btn-primary:hover { opacity: .88; background: var(--accent); color: white; }
.concepts-bar {
  padding: .9rem 1.5rem;
  background: var(--bg);
  border-bottom: 1px solid var(--border);
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  align-items: center;
}
.concept-chip {
  font-size: 11px;
  padding: 3px 10px;
  border-radius: 12px;
  background: white;
  border: 1px solid var(--border);
  color: var(--text2);
  cursor: pointer;
  transition: all .15s;
}
.concept-chip:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-light); }
.concept-label { font-size: 11px; color: var(--text3); margin-right: 2px; }
.diagram-area { padding: 1.5rem; }
.diagram-area svg { width: 100%; height: auto; display: block; }
.soon-area {
  padding: 2.5rem 1.5rem;
  text-align: center;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: .75rem;
}
.soon-icon {
  width: 48px; height: 48px; border-radius: 50%;
  background: var(--bg2);
  display: flex; align-items: center; justify-content: center;
  font-size: 22px;
}
.soon-title { font-family: var(--serif); font-size: 16px; font-weight: 700; color: var(--text); }
.soon-sub { font-size: 13px; color: var(--text2); line-height: 1.6; max-width: 340px; }
.soon-concepts { display: flex; gap: 5px; flex-wrap: wrap; justify-content: center; }

/* Responsive */
@media (max-width: 720px) {
  .layout { grid-template-columns: 1fr; }
  .sidebar { position: static; }
  .filter-list { flex-direction: row; flex-wrap: wrap; }
  .container { padding: 0 1rem; }
  .site-header .container { flex-wrap: wrap; }
  .header-count { display: none; }
}

/* SVG styles */
.ds-node { cursor: pointer; }
.ds-node rect, .ds-node circle { transition: opacity .15s; }
.ds-node:hover rect, .ds-node:hover circle { opacity: .85; }
@keyframes tgspin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
.spinning { transform-origin: 340px 148px; animation: tgspin 2s ease-in-out forwards; }
</style>
</head>
<body>

<header class="site-header">
  <div class="container">
    <a class="logo" href="#">
      <span class="logo-kr">성리학 도설 아카이브</span>
      <span class="logo-en">Neo-Confucian Diagrams</span>
    </a>
    <div class="search-wrap">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input type="text" id="search" placeholder="도설명, 저자, 개념어 검색…" oninput="render()">
    </div>
    <span class="header-count" id="hcount"></span>
  </div>
</header>

<main class="main">
  <div class="container">
    <div class="layout">
      <aside class="sidebar">
        <div class="sidebar-section">
          <div class="sidebar-label">국가</div>
          <div class="filter-list" id="filter-country"></div>
        </div>
        <div class="divider"></div>
        <div class="sidebar-section">
          <div class="sidebar-label">시대</div>
          <div class="filter-list" id="filter-era"></div>
        </div>
        <div class="divider"></div>
        <div class="sidebar-section">
          <div class="sidebar-label">주제</div>
          <div class="filter-list" id="filter-topic"></div>
        </div>
      </aside>

      <div class="cards-area">
        <div class="cards-grid" id="grid"></div>
        <div id="detail"></div>
      </div>
    </div>
  </div>
</main>

<script>
const DOSEOL = [
  {
    id: 'taeguk',
    title: '태극도설',
    hanja: '太極圖說',
    author: '주돈이 (周敦頤)',
    era: '북송',
    country: '중국',
    year: '1017–1073',
    desc: '무극에서 태극, 음양, 오행을 거쳐 만물이 생성되고 인간의 도덕 원리(인극)로 완성되는 우주 생성론. 성리학 우주론의 출발점.',
    tags: ['태극', '음양', '오행', '인극', '무극'],
    concepts: ['무극이태극', '음양', '오행', '건도성남', '곤도성녀', '만물화생', '인극', '성인', '주정(主靜)'],
    topics: ['우주론', '존재론'],
    era_color: '#534AB7', era_bg: '#EEEDFE',
    status: 'done',
  },
  {
    id: 'seonghak',
    title: '성학십도',
    hanja: '聖學十圖',
    author: '이황 (李滉)',
    era: '조선 중기',
    country: '한국',
    year: '1568',
    desc: '선조에게 올린 10개의 도설. 태극도에서 출발해 경(敬)을 중심으로 성학의 전 과정을 체계화한 퇴계학의 결정.',
    tags: ['경(敬)', '성학', '심학', '인(仁)', '태극'],
    concepts: ['태극도', '서명도', '소학도', '대학도', '심통성정도', '인설도', '심학도', '경재잠도'],
    topics: ['수양론', '심성론'],
    era_color: '#0F6E56', era_bg: '#E1F5EE',
    status: 'soon',
  },
  {
    id: 'simdo',
    title: '심통성정도',
    hanja: '心統性情圖',
    author: '이황 (李滉)',
    era: '조선 중기',
    country: '한국',
    year: '1568',
    desc: '마음(心)이 성(性)과 정(情)을 통괄하는 구조를 도식화. 사단칠정 논쟁의 핵심 도해로, 이발·기발의 문제를 시각적으로 정리.',
    tags: ['심(心)', '성(性)', '정(情)', '사단', '칠정'],
    concepts: ['심', '성', '정', '사단', '칠정', '이발', '기발'],
    topics: ['심성론', '윤리학'],
    era_color: '#993C1D', era_bg: '#FAECE7',
    status: 'soon',
  },
  {
    id: 'gewu',
    title: '격물치지도',
    hanja: '格物致知圖',
    author: '주희 (朱熹)',
    era: '남송',
    country: '중국',
    year: '1130–1200',
    desc: '사물의 이치를 탐구하여(格物) 앎을 완성하는(致知) 과정을 도식으로 표현. 대학 팔조목에 기반한 주자학 인식론의 핵심.',
    tags: ['격물', '치지', '이(理)', '궁리', '대학'],
    concepts: ['격물', '치지', '성의', '정심', '수신', '이(理)', '기(氣)'],
    topics: ['인식론', '수양론'],
    era_color: '#185FA5', era_bg: '#E6F1FB',
    status: 'soon',
  },
  {
    id: 'igido',
    title: '이기론 구조도',
    hanja: '理氣論 構造圖',
    author: '이이 (李珥)',
    era: '조선 중기',
    country: '한국',
    year: '1536–1584',
    desc: '이(理)와 기(氣)의 관계를 기발이승일도설로 정리한 율곡의 이기론. 이황과의 차이를 중심으로 조선 성리학의 분기점을 보여줌.',
    tags: ['이(理)', '기(氣)', '이기론', '기발이승', '사단칠정'],
    concepts: ['이(理)', '기(氣)', '이통기국', '기발이승', '사단', '칠정'],
    topics: ['존재론', '심성론'],
    era_color: '#854F0B', era_bg: '#FAEEDA',
    status: 'soon',
  },
  {
    id: 'ximing',
    title: '서명도',
    hanja: '西銘圖',
    author: '장재 (張載)',
    era: '북송',
    country: '중국',
    year: '1020–1077',
    desc: '천지를 부모로, 만물을 동포로 여기는 민포물여 사상을 도식화. 우주적 공동체론의 출발점이자 성리학 윤리론의 초석.',
    tags: ['천지', '민포물여', '인(仁)', '기(氣)', '태화'],
    concepts: ['건(乾)', '곤(坤)', '민포물여', '태화', '기(氣)'],
    topics: ['윤리학', '우주론'],
    era_color: '#3B6D11', era_bg: '#EAF3DE',
    status: 'soon',
  },
];

const FILTERS = {
  country: { label: '국가', key: 'country', values: ['전체', '중국', '한국'] },
  era: { label: '시대', key: 'era', values: ['전체', '북송', '남송', '조선 중기'] },
  topic: { label: '주제', key: 'topics', values: ['전체', '우주론', '존재론', '심성론', '수양론', '인식론', '윤리학'] },
};

const state = { country: '전체', era: '전체', topic: '전체', selected: 'taeguk' };

function getFiltered() {
  const q = document.getElementById('search').value.trim().toLowerCase();
  return DOSEOL.filter(d => {
    if (state.country !== '전체' && d.country !== state.country) return false;
    if (state.era !== '전체' && d.era !== state.era) return false;
    if (state.topic !== '전체' && !d.topics.includes(state.topic)) return false;
    if (!q) return true;
    return d.title.includes(q) || d.hanja.includes(q) || d.author.includes(q) ||
      d.tags.some(t => t.includes(q)) || d.concepts.some(c => c.includes(q)) || d.desc.includes(q);
  });
}

function renderSidebar() {
  const countryEl = document.getElementById('filter-country');
  const eraEl = document.getElementById('filter-era');
  const topicEl = document.getElementById('filter-topic');

  const countFor = (key, val) => val === '전체' ? DOSEOL.length :
    DOSEOL.filter(d => Array.isArray(d[key]) ? d[key].includes(val) : d[key] === val).length;

  countryEl.innerHTML = FILTERS.country.values.map(v =>
    `<button class="filter-btn${state.country===v?' active':''}" onclick="setFilter('country','${v}')">
      ${v}<span class="filter-count">${countFor('country',v)}</span>
    </button>`).join('');

  eraEl.innerHTML = FILTERS.era.values.map(v =>
    `<button class="filter-btn${state.era===v?' active':''}" onclick="setFilter('era','${v}')">
      ${v}<span class="filter-count">${countFor('era',v)}</span>
    </button>`).join('');

  topicEl.innerHTML = FILTERS.topic.values.map(v =>
    `<button class="filter-btn${state.topic===v?' active':''}" onclick="setFilter('topic','${v}')">
      ${v}<span class="filter-count">${countFor('topics',v)}</span>
    </button>`).join('');
}

function setFilter(type, val) { state[type] = val; render(); }

function render() {
  renderSidebar();
  const list = getFiltered();
  document.getElementById('hcount').textContent = `도설 ${list.length}개`;

  const grid = document.getElementById('grid');
  if (list.length === 0) {
    grid.innerHTML = `<div style="grid-column:1/-1;text-align:center;padding:3rem;color:var(--text3);font-size:14px">검색 결과가 없습니다</div>`;
    document.getElementById('detail').innerHTML = '';
    return;
  }

  grid.innerHTML = list.map(d => `
    <div class="card${state.selected===d.id?' active':''}" onclick="select('${d.id}')">
      <div class="card-top">
        <div class="card-titles">
          <div class="card-name">${d.title}</div>
          <div class="card-hanja">${d.hanja}</div>
        </div>
        <span class="era-badge" style="background:${d.era_bg};color:${d.era_color}">${d.era}</span>
      </div>
      <div class="card-author">${d.author}</div>
      <div class="card-desc">${d.desc}</div>
      <div class="card-tags">
        ${d.tags.slice(0,3).map(t=>`<span class="tag">${t}</span>`).join('')}
        ${d.status==='soon'?'<span class="soon-badge">준비중</span>':''}
      </div>
    </div>`).join('');

  renderDetail();
}

function select(id) {
  state.selected = id;
  render();
  setTimeout(() => document.getElementById('detail').scrollIntoView({behavior:'smooth',block:'nearest'}), 60);
}

function renderDetail() {
  const d = DOSEOL.find(x => x.id === state.selected);
  if (!d) return;
  const el = document.getElementById('detail');

  const headerHtml = `
    <div class="detail-header">
      <div class="detail-titles">
        <div class="detail-name">${d.title}</div>
        <div class="detail-hanja">${d.hanja} · ${d.author} · ${d.country} ${d.era}</div>
        <div class="detail-desc">${d.desc}</div>
        <div class="detail-meta">
          <span><strong>주제</strong> ${d.topics.join(', ')}</span>
          <span><strong>연도</strong> ${d.year}</span>
        </div>
      </div>
      <div class="detail-actions">
        ${d.status==='done'
          ? `<button class="btn btn-primary" onclick="askAbout('${d.title}')">개념 질문 ↗</button>`
          : `<button class="btn btn-primary" onclick="askAbout('${d.title}')">설명 요청 ↗</button>`
        }
      </div>
    </div>
    <div class="concepts-bar">
      <span class="concept-label">핵심 개념</span>
      ${d.concepts.map(c=>`<span class="concept-chip" onclick="askConcept('${d.title}','${c}')">${c}</span>`).join('')}
    </div>`;

  if (d.status === 'soon') {
    el.innerHTML = `<div class="detail-panel">${headerHtml}
      <div class="soon-area">
        <div class="soon-icon">◎</div>
        <div class="soon-title">도설 시각화 준비중</div>
        <div class="soon-sub">이 도설은 현재 현대적 재구성 작업 중입니다. 위의 개념 칩을 클릭하거나 설명 요청 버튼으로 내용을 먼저 확인하세요.</div>
        <div class="soon-concepts">
          ${d.concepts.slice(0,5).map(c=>`<span class="concept-chip" onclick="askConcept('${d.title}','${c}')">${c}</span>`).join('')}
        </div>
      </div>
    </div>`;
    return;
  }

  el.innerHTML = `<div class="detail-panel">${headerHtml}
    <div class="diagram-area" id="diagram-svg"></div>
  </div>`;

  injectTaegukSvg();
}

function tgSpin() {
  const g = document.getElementById('tg');
  if (!g) return;
  g.classList.remove('spinning');
  void g.offsetWidth;
  g.classList.add('spinning');
  setTimeout(() => g.classList.remove('spinning'), 2100);
}

function askConceptDirect(concept) {
  const tip = document.createElement('div');
  tip.style.cssText = `position:fixed;bottom:24px;left:50%;transform:translateX(-50%);
    background:#1A1916;color:white;padding:10px 18px;border-radius:10px;font-size:13px;
    font-family:'Noto Sans KR',sans-serif;z-index:9999;max-width:90%;text-align:center;
    animation:fadeup .3s ease`;
  tip.textContent = `💬 Claude에게 "${concept}"에 대해 질문해보세요`;
  document.body.appendChild(tip);
  setTimeout(() => tip.remove(), 3000);
}

const style = document.createElement('style');
style.textContent = `
  @keyframes tgspin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
  .spinning{transform-origin:340px 148px;animation:tgspin 2s ease-in-out forwards}
  @keyframes fadeup{from{opacity:0;transform:translateX(-50%) translateY(8px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
`;
document.head.appendChild(style);

render();
